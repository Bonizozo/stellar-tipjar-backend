apiVersion: apps/v1
kind: Deployment
metadata:
  name: stellar-tipjar-backend-green
  labels:
    app: stellar-tipjar-backend
    slot: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stellar-tipjar-backend
      slot: green
  template:
    metadata:
      labels:
        app: stellar-tipjar-backend
        slot: green
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: stellar-tipjar-backend
          image: stellar-tipjar-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tipjar-secrets
                  key: database-url
            - name: PORT
              value: "8000"
            - name: DEPLOYMENT_SLOT
              value: "green"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
